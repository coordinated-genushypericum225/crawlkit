<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CrawlKit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-950 text-gray-100">
  
  <div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
      
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="/" class="text-3xl font-bold text-indigo-500">🕷️ CrawlKit</a>
        <h1 class="text-2xl font-bold mt-6 mb-2">Create your account</h1>
        <p class="text-gray-400">Start crawling in seconds</p>
      </div>

      <!-- Form -->
      <div class="bg-gray-900 p-8 rounded-lg border border-gray-800">
        <form id="signupForm" class="space-y-6">
          
          <div>
            <label for="name" class="block text-sm font-medium mb-2">Full Name</label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              required
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500 transition"
              placeholder="John Doe"
            />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium mb-2">Email</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              required
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500 transition"
              placeholder="you@example.com"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium mb-2">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              required
              minlength="6"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500 transition"
              placeholder="••••••••"
            />
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm font-medium mb-2">Confirm Password</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              required
              minlength="6"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500 transition"
              placeholder="••••••••"
            />
          </div>

          <div id="errorMessage" class="hidden bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded-lg text-sm"></div>

          <button 
            type="submit" 
            id="submitBtn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition"
          >
            Create Account
          </button>

        </form>

        <div class="mt-6 text-center text-sm text-gray-400">
          Already have an account? 
          <a href="/login.html" class="text-indigo-500 hover:text-indigo-400 transition">Sign in</a>
        </div>
      </div>

      <p class="text-center text-gray-500 text-xs mt-6">
        By signing up, you agree to our Terms of Service and Privacy Policy
      </p>

    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.classList.remove('hidden');
        return;
      }

      if (password.length < 6) {
        errorMessage.textContent = 'Password must be at least 6 characters';
        errorMessage.classList.remove('hidden');
        return;
      }

      // Hide error
      errorMessage.classList.add('hidden');

      // Loading state
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';
      submitBtn.classList.add('btn-loading');

      try {
        const response = await fetch(`${API_URL}/v1/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || data.message || 'Registration failed');
        }

        // Store auth
        setAuth(data.api_key || data.apiKey, data.user);

        // Redirect to dashboard
        window.location.href = '/dashboard.html';

      } catch (error) {
        errorMessage.textContent = error.message;
        errorMessage.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
        submitBtn.classList.remove('btn-loading');
      }
    });
  </script>

</body>
</html>
