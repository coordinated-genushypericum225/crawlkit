name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "import crawlkit; print('✓ crawlkit imports successfully')"
        python -c "from crawlkit import CrawlKit; print('✓ CrawlKit class available')"
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check crawlkit/ --select E,F,W || true
      continue-on-error: true
